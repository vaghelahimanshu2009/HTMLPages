<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #50 - The Void Sandbox</title>
    <style>
        :root {
            --bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
            position: relative;
        }

        .instruction {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #333; font-family: monospace; font-size: 1rem; letter-spacing: 5px;
            pointer-events: none; transition: 0.5s; user-select: none; z-index: 0;
        }

        /* 
          =============================================
          THE NEON ORBS
          =============================================
        */
        .orb {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen; /* Makes overlapping orbs extra bright */
            transform: translate(-50%, -50%); /* Center the div over mouse coords */
        }
        
        .glow {
            width: 100%; height: 100%; border-radius: 50%;
            filter: blur(20px);
        }

    </style>
</head>
<body>

    <div class="instruction" id="instruct">CLICK ANYWHERE IN THE VOID</div>

    <script>
        const instruct = document.getElementById('instruct');
        const orbs = [];
        const colors = [
            '#ff0055', '#00ffcc', '#aa00ff', '#f2ff00', '#00f', '#f0f'
        ];

        // Object oriented JS to handle bouncing balls
        class Orb {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // Random velocity angle and speed
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // Random size and color
                this.radius = 20 + Math.random() * 50;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Create DOM element
                this.el = document.createElement('div');
                this.el.classList.add('orb');
                this.el.style.width = `${this.radius * 2}px`;
                this.el.style.height = `${this.radius * 2}px`;
                
                const glow = document.createElement('div');
                glow.classList.add('glow');
                glow.style.background = this.color;
                
                // The hard white center core
                const core = document.createElement('div');
                core.style.position = 'absolute';
                core.style.top = '50%'; core.style.left = '50%';
                core.style.transform = 'translate(-50%, -50%)';
                core.style.width = '20%'; core.style.height = '20%';
                core.style.background = '#fff'; core.style.borderRadius = '50%';
                
                this.el.appendChild(glow);
                this.el.appendChild(core);
                document.body.appendChild(this.el);
            }

            update() {
                // Move
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x - this.radius <= 0 || this.x + this.radius >= window.innerWidth) {
                    this.vx *= -1;
                }
                if (this.y - this.radius <= 0 || this.y + this.radius >= window.innerHeight) {
                    this.vy *= -1;
                }

                // Render DOM
                this.el.style.left = `${this.x}px`;
                this.el.style.top = `${this.y}px`;
            }
        }

        // Click to spawn
        document.body.addEventListener('click', (e) => {
            instruct.style.opacity = '0'; // Hide instruction
            orbs.push(new Orb(e.clientX, e.clientY));
        });

        // The animation loop
        function animate() {
            orbs.forEach(orb => orb.update());
            requestAnimationFrame(animate);
        }
        
        animate(); // Start loop

    </script>
</body>
</html>
