<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #26 - MacOS Finder System</title>
    <!-- Native OS Apple style fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* macOS Light Mode equivalents */
            --mac-bg: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&q=80&w=1920'); /* Colorful abstract bg */
            --finder-bg: rgba(255, 255, 255, 0.7);
            --sidebar-bg: rgba(240, 240, 240, 0.6);
            --border: rgba(0, 0, 0, 0.1);
            --glass-blur: blur(30px);
            --text-dark: #1d1d1f;
            --blue: #0066cc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--mac-bg) center/cover no-repeat;
            color: var(--text-dark);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 
          =============================================
          GLOBAL OS MENU BAR
          =============================================
        */
        .menu-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 28px;
            background: rgba(255,255,255,0.3); backdrop-filter: blur(20px) saturate(150%);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 1rem; font-size: 0.85rem; font-weight: 500; border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .m-left, .m-right { display: flex; gap: 15px; }
        .m-bold { font-weight: 600; }

        /* 
          =============================================
          THE FINDER WINDOW
          =============================================
        */
        .window {
            width: 80vw; max-width: 1000px; height: 70vh;
            background: var(--finder-bg);
            backdrop-filter: var(--glass-blur) saturate(180%);
            -webkit-backdrop-filter: var(--glass-blur) saturate(180%);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05); /* OS Drop shadow */
            display: flex; flex-direction: column; overflow: hidden;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* HEADER / TRAFFIC LIGHTS */
        .w-header {
            height: 52px; display: flex; align-items: center; padding: 0 15px;
            border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.4);
        }
        .traffic-lights { display: flex; gap: 8px; margin-right: 20px;}
        .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .light.red { background: #ff5f56; border: 1px solid #e0443e; }
        .light.yellow { background: #ffbd2e; border: 1px solid #dea123; }
        .light.green { background: #27c93f; border: 1px solid #1aab29; }

        .header-title { display: flex; align-items:center; gap: 10px; font-weight: 500; font-size: 0.9rem;}
        .header-nav { display: flex; gap: 5px; margin-left: 20px;}
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 4px 10px; border-radius: 4px; font-size: 1rem; cursor: pointer;}
        .search-bar { margin-left: auto; background: rgba(0,0,0,0.05); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; width: 150px;}

        /* MAIN BODY FRAME */
        .w-body { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR (Vibrancy) */
        .sidebar {
            width: 200px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 10px; overflow-y: auto;
        }
        .s-title { font-size: 0.75rem; color: #666; font-weight: 600; text-transform: capitalize; margin: 10px 0 5px 10px; }
        .s-item { padding: 6px 10px; font-size: 0.85rem; font-weight: 500; border-radius: 5px; cursor: pointer; display: flex; align-items:center; gap: 8px;}
        .s-item:hover { background: rgba(0,0,0,0.05); }
        .s-item.active { background: var(--blue); color: #fff; }

        /* ICON GRID AREA */
        .content-area {
            flex: 1; padding: 20px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px; align-content: start;
        }
        
        .file-icon {
            display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer;
            padding: 10px; border-radius: 5px;
        }
        .file-icon:hover { background: rgba(0,0,0,0.05); }
        .f-img { width: 60px; height: 60px; margin-bottom: 5px; border-radius: 5px; display:flex; justify-content:center; align-items:center; font-size: 2rem;}
        
        /* CSS Folder representation */
        .f-folder { background: #8cd1f2; position:relative; box-shadow: -1px 2px 5px rgba(0,0,0,0.1); width: 60px; height: 45px; border-radius: 4px; margin-bottom:15px; margin-top:5px;}
        .f-folder::after { content:''; position:absolute; top:-6px; left:0; width: 25px; height: 10px; background: #8cd1f2; border-radius: 4px 4px 0 0; }
        
        .f-name { font-size: 0.8rem; line-height: 1.2; word-break: break-word;}

    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="m-left">
            <span class="m-bold"> WebOS</span>
            <span class="m-bold">File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Go</span>
            <span>Window</span>
            <span>Help</span>
        </div>
        <div class="m-right">
            <span>100% 🔋</span>
            <span>Fri Apr 10 10:41 AM</span>
        </div>
    </div>

    <div class="window">
        <!-- Window Traffic Lights and Title Bar -->
        <div class="w-header">
            <div class="traffic-lights">
                <div class="light red"></div>
                <div class="light yellow"></div>
                <div class="light green"></div>
            </div>
            <div class="header-nav">
                <button class="nav-btn">⟨</button>
                <button class="nav-btn">⟩</button>
            </div>
            <div class="header-title" style="margin-left:20px;">
                ≣ Desktop
            </div>
            <input type="text" class="search-bar" placeholder="Search">
        </div>

        <div class="w-body">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="s-title">Favorites</div>
                <div class="s-item">⏱ Recents</div>
                <div class="s-item">☁️ Documents</div>
                <div class="s-item active">🖥 Desktop</div>
                <div class="s-item">⬇️ Downloads</div>
                
                <div class="s-title" style="margin-top: 20px;">Tags</div>
                <div class="s-item"><div class="light red"></div> Urgent</div>
                <div class="s-item"><div class="light yellow"></div> Work</div>
                <div class="s-item"><div class="light green"></div> Design</div>
            </div>

            <!-- Content Grid Container -->
            <div class="content-area">
                <div class="file-icon">
                    <div class="f-folder"></div>
                    <span class="f-name">Project Proposals</span>
                </div>
                <div class="file-icon">
                    <div class="f-folder"></div>
                    <span class="f-name">Assets</span>
                </div>
                <div class="file-icon">
                    <div class="f-folder" style="filter: hue-rotate(180deg);"></div>
                    <span class="f-name">Code Backup</span>
                </div>
                <div class="file-icon">
                    <div class="f-img" style="background:#fff; border: 1px solid #ccc; font-size:1rem; padding-top:15px; color:#555;">JPG</div>
                    <span class="f-name">Screenshot_1.jpg</span>
                </div>
                <div class="file-icon">
                    <div class="f-img" style="background:#ccc; border: 1px solid #999; font-size:1rem; padding-top:15px; color:#111;">HTML</div>
                    <span class="f-name">index.html</span>
                </div>
                 <div class="file-icon">
                    <div class="f-img" style="background:#ffbd2e; border: 1px solid #999; font-size:1rem; padding-top:15px; color:#111;">.JS</div>
                    <span class="f-name">animation.js</span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
