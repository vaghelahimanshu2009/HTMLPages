<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #32 - RGB Glitch Hover</title>
    <!-- Brutalist font -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #e2e2e2;
            --text: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        /* 
          =============================================
          THE GLITCH IMAGE WRAPPER
          =============================================
        */
        .portfolio-grid {
            min-height: 100vh; padding: 10vw 5vw; display: flex; flex-direction: column; gap: 10vw; align-items: center;
        }

        .glitch-wrapper {
            position: relative; width: 60vw; max-width: 800px; aspect-ratio: 16/9; cursor: crosshair;
        }

        /* 
           We use 3 overlapping layers of the identical image.
           Normally they sit perfectly on top of each other and are greyscale.
           On hover, they colorize (mix-blend-mode: screen) and offset to create the chromatic aberration.
        */
        .g-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=1200'); /* Abstract arch */
            background-size: cover; background-position: center;
            filter: grayscale(100%);
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.2s;
            mix-blend-mode: multiply;
        }

        .glitch-wrapper:hover .g-layer { mix-blend-mode: screen; filter: grayscale(0%); }

        /* Cyan channel */
        .glitch-wrapper:hover .g-layer:nth-child(1) {
            transform: translate(-15px, 10px);
            background-color: cyan; background-blend-mode: lighten;
        }
        
        /* Red channel */
        .glitch-wrapper:hover .g-layer:nth-child(2) {
            transform: translate(15px, -10px);
            background-color: red; background-blend-mode: lighten;
        }
        
        /* Base image remains centered */
        .glitch-wrapper:hover .g-layer:nth-child(3) {
            transform: translate(0, 0); opacity: 0.8;
       }

       /* Huge overlay text that also glitches */
       .g-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Anton', sans-serif; font-size: 10vw; color: white; text-transform: uppercase;
            pointer-events: none; z-index: 10; mix-blend-mode: difference; transition: 0.2s;
       }
       .glitch-wrapper:hover .g-text {
            text-shadow: -10px 5px 0 cyan, 10px -5px 0 red;
       }

       /* Header */
       header { padding: 2rem 5vw; text-align: center; font-family: 'Anton'; font-size: 3rem; text-transform: uppercase; border-bottom: 5px solid var(--text);}
       header span { display: block; font-family: 'DM Sans'; font-size: 1rem; font-weight: bold; margin-top: 1rem;}

    </style>
</head>
<body>

    <header>
        Distortion Physics
        <span>Hover over the architectural frames to induce split-channel chromatic aberration.</span>
    </header>

    <div class="portfolio-grid">
        
        <div class="glitch-wrapper">
            <div class="g-layer"></div>
            <div class="g-layer"></div>
            <div class="g-layer"></div>
            <div class="g-text">STRUCTURAL</div>
        </div>

        <div class="glitch-wrapper">
            <div class="g-layer" style="background-image: url('https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&q=80&w=1200');"></div>
            <div class="g-layer" style="background-image: url('https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&q=80&w=1200');"></div>
            <div class="g-layer" style="background-image: url('https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&q=80&w=1200');"></div>
            <div class="g-text">INTERIOR</div>
        </div>

    </div>

</body>
</html>
