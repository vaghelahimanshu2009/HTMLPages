<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #36 - Cybernetic HUD</title>
    <!-- True digital monospaced font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030508;
            --hud-primary: #00ffaa;
            --hud-warn: #ff3333;
            --glow: 0 0 10px var(--hud-primary), 0 0 20px var(--hud-primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--hud-primary);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        ::selection { background: var(--hud-primary); color: #000; }

        /* The overall visor overlay */
        .visor {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            border: 20px solid rgba(0, 255, 170, 0.05); pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, rgba(0, 25px, 17, 0.7) 100%);
            z-index: 100;
        }
        
        .corner { position: absolute; width: 60px; height: 60px; border: 2px solid var(--hud-primary); }
        .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; box-shadow: -2px -2px 10px rgba(0,255,170,0.5); }
        .tr { top: 30px; right: 30px; border-left: none; border-bottom: none; box-shadow: 2px -2px 10px rgba(0,255,170,0.5); }
        .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; box-shadow: -2px 2px 10px rgba(0,255,170,0.5); }
        .br { bottom: 30px; right: 30px; border-left: none; border-top: none; box-shadow: 2px 2px 10px rgba(0,255,170,0.5); }

        /* 
          =============================================
          CENTER RETICLE
          =============================================
        */
        .reticle-container {
            position: relative; width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0, 255, 170, 0.3); }
        
        /* Dashed outer ring */
        .ring-1 {
            width: 450px; height: 450px; border: 2px dashed rgba(0, 255, 170, 0.5);
            animation: rotate-slow 20s linear infinite;
        }
        
        /* Dotted reverse ring */
        .ring-2 {
            width: 350px; height: 350px; border: 6px dotted rgba(0, 255, 170, 0.8);
            animation: rotate-slow 15s linear infinite reverse;
        }
        
        /* Inner solid target */
        .ring-3 {
            width: 200px; height: 200px; border: 1px solid var(--hud-primary); box-shadow: var(--glow);
        }

        .crosshair-line { position: absolute; background: var(--hud-primary); opacity: 0.5; }
        .c-v { width: 1px; height: 100vh; top: -50vh; left: 50%; }
        .c-h { width: 100vw; height: 1px; top: 50%; left: -50vw; }

        @keyframes rotate-slow { 100% { transform: rotate(360deg); } }

        /* 
          =============================================
          DATA PANELS
          =============================================
        */
        .panel { position: absolute; padding: 20px; font-size: 0.9rem; letter-spacing: 1px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,170,0.2);}
        .panel h3 { font-size: 1.2rem; margin-bottom: 10px; border-bottom: 1px solid var(--hud-primary); display: inline-block; padding-bottom: 5px; text-shadow: var(--glow);}
        
        .p-left { left: 5vw; top: 50%; transform: translateY(-50%); }
        .p-right { right: 5vw; top: 50%; transform: translateY(-50%); text-align: right; }
        
        .data-row { margin: 10px 0; display: flex; justify-content: space-between; gap: 2rem;}

        /* Random blinking / flashing for HUD effect */
        .blink { animation: blink 0.1s step-end infinite alternate; opacity: 0.2; }
        @keyframes blink { 100% { opacity: 0.8; } }

        .warning { color: var(--hud-warn); border-color: var(--hud-warn) !important; text-shadow: 0 0 10px var(--hud-warn); }

    </style>
</head>
<body>

    <div class="visor">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <!-- Center Aiming Reticle -->
    <div class="crosshair-line c-v"></div>
    <div class="crosshair-line c-h"></div>
    <div class="reticle-container">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div style="font-size: 2rem; font-weight: bold; text-shadow: var(--glow);">LOCKED</div>
    </div>

    <!-- Telemetry Data Left -->
    <div class="panel p-left">
        <h3>SYS.DIAGNOSTICS</h3>
        <div class="data-row"><span>CORE_TEMP</span><span id="t1">89°C</span></div>
        <div class="data-row warning"><span>INTEGRITY</span><span>CRITICAL</span></div>
        <div class="data-row"><span>POWER_LVL</span><span>NORMAL</span></div>
        
        <!-- Random CSS bar chart equivalent -->
        <div style="margin-top:20px;">
            <div style="margin-bottom:5px;">FREQUENCY</div>
            <div style="width: 150px; height: 10px; border: 1px solid var(--hud-primary); padding: 1px;">
                <div style="width: 78%; height: 100%; background: var(--hud-primary);"></div>
            </div>
            <div style="width: 150px; height: 10px; border: 1px solid var(--hud-warn); padding: 1px; margin-top:5px;">
                <div class="blink" style="width: 95%; height: 100%; background: var(--hud-warn);"></div>
            </div>
        </div>
    </div>

    <!-- Telemetry Data Right -->
    <div class="panel p-right">
        <h3>VECTOR.TARGETING</h3>
        <div class="data-row"><span>AXIS_X</span><span id="nx">345.191</span></div>
        <div class="data-row"><span>AXIS_Y</span><span id="ny">00.412</span></div>
        <div class="data-row"><span>AXIS_Z</span><span id="nz">-88.01A</span></div>
        <div style="margin-top:20px; font-size:0.7rem; color:#888;">
            01010100 01000001 01010010<br>01000111 01000101 01010100<br>01010011 01000101 01010100
        </div>
    </div>

    <!-- Javascript to randomize numbers for an immersive feel -->
    <script>
        setInterval(() => {
            document.getElementById('nx').innerText = (Math.random() * 999).toFixed(3);
            document.getElementById('ny').innerText = (Math.random() * 99).toFixed(3);
        }, 500);

        setInterval(() => {
            document.getElementById('t1').innerText = Math.floor(80 + Math.random() * 15) + '°C';
        }, 2000);
    </script>
</body>
</html>
