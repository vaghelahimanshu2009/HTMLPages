<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #40 - Vaporwave 80s Grid</title>
    <!-- Retro Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-bg: #0b0220;
            --grid-pink: #f218a5;
            --sun-yellow: #fad126;
            --sun-magenta: #ff0070;
            --glow: #0ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--space-bg);
            color: #fff;
            overflow: hidden; /* We are locking the viewport to the horizon */
            font-family: 'Varela Round', sans-serif;
            height: 100vh;
            position: relative;
        }

        /* 
          =============================================
          THE SUN (Linear gradient with transparency stripes)
          =============================================
        */
        .sun {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px; border-radius: 50%;
            background: linear-gradient(180deg, var(--sun-yellow) 0%, var(--sun-magenta) 100%);
            box-shadow: 0 0 50px var(--sun-magenta);
            z-index: 10;
        }
        /* Cutting stripes out of the sun using repeating linear gradients inside a mask */
        .sun::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 15px, var(--space-bg) 15px, var(--space-bg) 25px);
            border-bottom-left-radius: 200px; border-bottom-right-radius: 200px;
        }

        /* 
          =============================================
          THE RETRO HORIZON GRID (3D Perspective)
          =============================================
        */
        .grid-container {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: 50vh;
            perspective: 600px; z-index: 20; 
            /* Hide the grid pushing too far back */
            overflow: hidden;
            /* Put a dark gradient over the horizon line to fade out the grid */
            background: linear-gradient(to bottom, var(--space-bg) 0%, transparent 20%);
        }

        .grid-plane {
            position: absolute; bottom: -50%; left: -50%; width: 200vw; height: 200vh;
            background-image: 
                linear-gradient(var(--grid-pink) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-pink) 2px, transparent 2px);
            background-size: 50px 50px;
            /* Flatten it out towards the user */
            transform: rotateX(80deg);
            transform-origin: top;
            /* Animate the grid moving forward */
            animation: move-grid 2s linear infinite;
        }

        @keyframes move-grid {
            0% { transform: rotateX(80deg) translateY(0); }
            100% { transform: rotateX(80deg) translateY(50px); }
        }

        /* 
          =============================================
          TYPOGRAPHY & UI OVERLAY
          =============================================
        */
        .hero-text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; text-align: center; width: 100%;
        }

        .hero-text h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(6rem, 15vw, 12rem);
            line-height: 1;
            /* Classic 80s chrome/cyan text gradient */
            background: linear-gradient(to bottom, #fff 0%, #0ff 40%, #009 50%, #f0f 55%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            /* Deep neon drop shadow outline */
            filter: drop-shadow(0 0 10px rgba(0,255,255,0.8)) drop-shadow(4px 4px 0px #000);
            margin-bottom: -1rem;
        }

        .subtitle {
            font-family: 'Varela Round', sans-serif;
            font-size: 2rem; color: #ff00ff; letter-spacing: 15px; text-transform: uppercase;
            text-shadow: 0 0 10px #ff00ff;
            /* Cursive overlay style */
            font-weight: bold; font-style: italic;
            transform: rotate(-5deg); display: inline-block;
        }
        
        .mountains {
            position: absolute; bottom: 50vh; left: 0; width: 100vw; height: 100px; z-index: 15;
            background: url('data:image/svg+xml,%3Csvg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpolygon points=\"0,100 20,40 40,80 60,30 80,70 100,20 100,100\" fill=\"%2308011c\" stroke=\"%230ff\" stroke-width=\"1\"/%3E%3C/svg%3E') repeat-x bottom;
            background-size: contain;
        }

    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="mountains"></div>

    <div class="hero-text">
        <h1>OUTRUN</h1>
        <div class="subtitle">A E S T H E T I C S</div>
    </div>

    <!-- The 3D floor -->
    <div class="grid-container">
        <div class="grid-plane"></div>
    </div>

</body>
</html>
