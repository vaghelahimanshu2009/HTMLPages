<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #49 - Neumorphic Synth</title>
    <!-- Geometric Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* The classic Neumorphic clay grey background */
            --neu-bg: #e0e5ec;
            
            /* The two shadow colors that make Neumorphism work */
            --neu-light: #ffffff;
            --neu-dark: #a3b1c6;
            
            --accent: #ff4757;
            --text-color: #4a4a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--neu-bg);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .synth-board {
            padding: 50px;
            border-radius: 40px;
            /* Protruding Neumorphic base */
            box-shadow: 20px 20px 40px var(--neu-dark), -20px -20px 40px var(--neu-light);
            background: var(--neu-bg);
            display: flex; gap: 40px;
        }

        /* 
          =============================================
          SLIDERS (Vertical Faders)
          =============================================
        */
        .fader-rack { display: flex; gap: 30px; }
        
        .fader-track {
            width: 20px; height: 250px; border-radius: 10px;
            /* Inset shadow makes it look carved in */
            box-shadow: inset 4px 4px 10px var(--neu-dark), inset -4px -4px 10px var(--neu-light);
            position: relative; display: flex; justify-content: center;
        }
        
        .fader-knob {
            width: 50px; height: 30px; border-radius: 10px;
            /* Protruding shadow */
            box-shadow: 4px 4px 10px var(--neu-dark), -4px -4px 10px var(--neu-light);
            background: var(--neu-bg);
            position: absolute; top: 50%; cursor: ns-resize;
            display: flex; justify-content: center; align-items: center;
            transition: 0.1s;
        }
        .fader-knob::after { content: ''; width: 30px; height: 2px; background: var(--accent); opacity: 0.5;}
        .fader-knob:active { box-shadow: inset 2px 2px 5px var(--neu-dark), inset -2px -2px 5px var(--neu-light); }

        /* Specific static positions for UI sake */
        .k1 { top: 70%; }
        .k2 { top: 20%; }
        .k3 { top: 40%; }
        .k4 { top: 90%; }

        /* 
          =============================================
          BUTTON PADS
          =============================================
        */
        .drum-pads { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .pad {
            width: 100px; height: 100px; border-radius: 20px; cursor: pointer;
            box-shadow: 8px 8px 16px var(--neu-dark), -8px -8px 16px var(--neu-light);
            background: var(--neu-bg);
            transition: 0.1s; display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.5rem; color: #a3b1c6;
        }
        
        /* The pressed-in state */
        .pad:active, .pad.toggled {
            box-shadow: inset 6px 6px 12px var(--neu-dark), inset -6px -6px 12px var(--neu-light);
            color: var(--accent);
        }

        .pad-group { display: flex; flex-direction: column; justify-content: space-between;}
        
        .master-vol {
            width: 120px; height: 120px; border-radius: 50%;
            box-shadow: 10px 10px 20px var(--neu-dark), -10px -10px 20px var(--neu-light);
            background: var(--neu-bg); margin: 0 auto;
            position: relative;
        }
        /* Volume dot indicator */
        .master-vol::after {
            content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); top: 15px; left: 25px; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div class="synth-board">
        
        <!-- Faders -->
        <div class="fader-rack">
            <div class="fader-track"><div class="fader-knob k1"></div></div>
            <div class="fader-track"><div class="fader-knob k2"></div></div>
            <div class="fader-track"><div class="fader-knob k3"></div></div>
            <div class="fader-track"><div class="fader-knob k4"></div></div>
        </div>

        <!-- Drum Pads -->
        <div class="drum-pads">
            <div class="pad" onclick="this.classList.toggle('toggled')">KICK</div>
            <div class="pad" onclick="this.classList.toggle('toggled')">SNARE</div>
            <div class="pad" onclick="this.classList.toggle('toggled')">CLAP</div>
            <div class="pad" onclick="this.classList.toggle('toggled')">RSAM</div>
        </div>

        <!-- Master Control -->
        <div class="pad-group">
            <div style="text-align: center; font-weight: bold; letter-spacing: 2px;">MASTER</div>
            <div class="master-vol"></div>
            <div class="pad" style="width: 100%; height: 60px;" onclick="this.classList.toggle('toggled')">PLAY</div>
        </div>

    </div>

</body>
</html>
