<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #28 - 3D Isometric Grid</title>
    <!-- Solid technical display -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f4f4;
            --cube-top: #ffffff;
            --cube-right: #cccccc;
            --cube-left: #e6e6e6;
            --accent: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: #111;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* 
          =============================================
          ISOMETRIC SCENE SETUP
          =============================================
        */
        .scene-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
        }

        /* The grid floor that gets tilted */
        .iso-grid {
            width: 600px; height: 600px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            /* The classic isometric CSS transform */
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            transition: 0.5s;
        }

        /* 
          =============================================
          THE 3D CUBES (Created via pseudo blocks)
          =============================================
        */
        .cube {
            width: 100%; height: 100%;
            background: var(--cube-top);
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05); /* Outline the top */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1;
        }

        /* Right Face */
        .cube::before {
            content: ''; position: absolute; top: 0; left: 100%; width: 50px; height: 100%;
            background: var(--cube-right); transform-origin: left; transform: rotateY(90deg);
        }
        
        /* Bottom/Left Face */
        .cube::after {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 50px;
            background: var(--cube-left); transform-origin: top; transform: rotateX(-90deg);
        }

        /* Interaction - Extrude the block upward along Z-axis */
        .cube:hover {
            transform: translateZ(50px);
            background: var(--accent);
            z-index: 10;
        }
        .cube:hover::before { background: #d63031; }
        .cube:hover::after { background: #ff7675; }

        /* Specific block heights for variety */
        .cube.tall { transform: translateZ(30px); }
        .cube.tall::before { width: 80px; }
        .cube.tall::after { height: 80px; }
        .cube.tall:hover { transform: translateZ(80px); }

        .cube.empty { opacity: 0; pointer-events: none; } /* Missing teeth in grid */

        /* 
          =============================================
          UI OVERLAYS
          =============================================
        */
        .floating-ui {
            position: fixed; top: 5vw; left: 5vw; z-index: 100;
        }
        .floating-ui h1 { font-size: 5rem; letter-spacing: -2px; margin-bottom: 1rem;}
        .floating-ui p { font-size: 1.2rem; max-width: 400px; color: #555; }

    </style>
</head>
<body>

    <div class="floating-ui">
        <h1>CITY_GRID</h1>
        <p>Information architecture interpreted literally. Hover over city blocks to pull data instances from the core. Engineered utilizing pure CSS 3D matrix transformations.</p>
    </div>

    <div class="scene-container">
        <!-- The Isometric Board -->
        <div class="iso-grid">
            <div class="cube tall"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube empty"></div>
            
            <div class="cube"></div>
            <div class="cube tall"></div>
            <div class="cube empty"></div>
            <div class="cube"></div>
            
            <div class="cube empty"></div>
            <div class="cube"></div>
            <div class="cube tall"></div>
            <div class="cube"></div>
            
            <div class="cube"></div>
            <div class="cube empty"></div>
            <div class="cube"></div>
            <div class="cube tall"></div>
        </div>
    </div>

</body>
</html>
