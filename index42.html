<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #42 - CCTV Security Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --text-color: #fff;
            --rec-red: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 5px; /* Monitor separation */
            padding: 5px;
        }

        /* 
          =============================================
          CAMERA MONITOR PANELS
          =============================================
        */
        .cam {
            background: #111; position: relative; overflow: hidden;
            border: 1px solid #333;
        }

        /* Generic grainy unsplash photos for camera feeds */
        .cam img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(150%) brightness(0.6); }

        /* The CRT/CCTV scanline overlay */
        .cam::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            pointer-events: none; z-index: 5;
        }

        /* Vertical roll glitch on specific cameras */
        .cam-2::after {
            content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 50px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            animation: v-roll 4s infinite linear; z-index: 6; pointer-events: none;
        }
        @keyframes v-roll { 100% { top: 100%; } }

        /* 
          =============================================
          UI OVERLAYS
          =============================================
        */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;}
        
        .top-row { display: flex; justify-content: space-between; align-items: flex-start;}
        .cam-name { font-size: 1.5rem; text-shadow: 2px 2px 0 #000; }
        
        .rec-box { display: flex; align-items: center; gap: 10px; font-weight: bold; text-shadow: 2px 2px 0 #000;}
        .rec-dot { width: 15px; height: 15px; background: var(--rec-red); border-radius: 50%; box-shadow: 0 0 10px var(--rec-red); animation: rec-blink 1s infinite; }
        @keyframes rec-blink { 50% { opacity: 0; } }

        .bottom-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: 1.2rem; text-shadow: 2px 2px 0 #000;}

        /* Specifically style the 4th camera as "NO SIGNAL" */
        .cam-4 { background: repeating-linear-gradient(45deg, #222, #222 10px, #111 10px, #111 20px); }
        .cam-4 img { display: none; }
        .no-signal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; text-align: center; color: #555; text-shadow: none !important; animation: rec-blink 2s infinite;}

    </style>
</head>
<body>

    <!-- CAM 1 -->
    <div class="cam cam-1">
        <img src="https://images.unsplash.com/photo-1542488661-d1c920f4f9a0?auto=format&fit=crop&q=80&w=800" alt="Lobby">
        <div class="ui-layer">
            <div class="top-row">
                <div class="cam-name">CAM 01 // LOBBY</div>
                <div class="rec-box"><div class="rec-dot"></div> REC</div>
            </div>
            <div class="bottom-row">
                <div>CH-1</div>
                <div class="timestamp">2026/04/10 <span class="time-read">10:45:00</span></div>
            </div>
        </div>
    </div>

    <!-- CAM 2 -->
    <div class="cam cam-2">
        <img src="https://images.unsplash.com/photo-1587309995166-419a4bd6949a?auto=format&fit=crop&q=80&w=800" alt="Corridor">
        <div class="ui-layer">
            <div class="top-row">
                <div class="cam-name">CAM 02 // SECTOR G</div>
                <div class="rec-box"><div class="rec-dot"></div> REC</div>
            </div>
            <div class="bottom-row">
                <div>CH-2</div>
                <div class="timestamp">2026/04/10 <span class="time-read">10:45:00</span></div>
            </div>
        </div>
    </div>

    <!-- CAM 3 -->
    <div class="cam cam-3">
        <img src="https://images.unsplash.com/photo-1555529733-0e67056058ab?auto=format&fit=crop&q=80&w=800" alt="Server Room">
        <div class="ui-layer">
            <div class="top-row">
                <div class="cam-name">CAM 03 // MAINFRAME</div>
                <div class="rec-box"><div class="rec-dot"></div> REC</div>
            </div>
            <div class="bottom-row">
                <div>CH-3</div>
                <div class="timestamp">2026/04/10 <span class="time-read">10:45:00</span></div>
            </div>
        </div>
    </div>

    <!-- CAM 4 - NO SIGNAL -->
    <div class="cam cam-4">
        <div class="no-signal">SIGNAL<br>LOST</div>
        <div class="ui-layer">
            <div class="top-row">
                <div class="cam-name" style="color:red;">CAM 04 // EXTERIOR</div>
                <div class="rec-box" style="color:red;">ERR</div>
            </div>
            <div class="bottom-row">
                <div style="color:red;">CH-4</div>
                <div class="timestamp" style="color:red;">2026/04/10 <span class="time-read">10:45:00</span></div>
            </div>
        </div>
    </div>

    <!-- Javascript to keep time moving -->
    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            const timers = document.querySelectorAll('.time-read');
            timers.forEach(t => t.innerText = timeString);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
