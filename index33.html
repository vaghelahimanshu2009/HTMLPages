<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Design #33 - Magazine Cutout Collage</title>
    <!-- Multiple chaotic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bangers&family=Courier+Prime:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #f4d03f; /* Harsh yellow */
            --ink: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--paper);
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px; /* Dot pattern */
            color: var(--ink);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 
          =============================================
          RANSOM NOTE TITLE LOGIC
          =============================================
        */
        .ransom-title {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 5rem; z-index: 10;
        }
        
        .char-box {
            display: inline-block; padding: 10px 20px; background: #fff; color: #000; font-size: 5rem;
            transform-origin: center; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            /* Different fonts and rotations per box applied below */
        }

        .c1 { font-family: 'Abril Fatface', cursive; transform: rotate(-10deg); background: #000; color: #fff;}
        .c2 { font-family: 'Bangers', cursive; transform: rotate(5deg) scale(1.2); }
        .c3 { font-family: 'Courier Prime', monospace; transform: rotate(-5deg); background: #f00; color: #fff;}
        .c4 { font-family: 'Permanent Marker', cursive; transform: rotate(15deg); }
        .c5 { font-family: 'Times New Roman', serif; font-weight: bold; transform: rotate(-8deg); background: cyan;}
        .c6 { font-family: 'Arial', sans-serif; font-weight: 900; transform: rotate(2deg); background: magenta; color: #fff;}

        /* 
          =============================================
          CUTOUT IMAGES (Clip-Path Polygon magic)
          =============================================
        */
        .collage { position: relative; width: 100%; max-width: 1000px; height: 600px; margin-top: -5rem; z-index: 1;}

        .cutout {
            position: absolute;
            background: #fff; padding: 5px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .cutout:hover { z-index: 50 !important; transform: scale(1.1) !important; cursor: pointer; }

        .cutout img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(150%); }

        /* Applying rough scissors logic using clip-path */
        .img-1 {
            width: 300px; height: 400px; left: 10%; top: 10%; transform: rotate(-15deg); z-index: 2;
            clip-path: polygon(0% 5%, 95% 0%, 100% 90%, 5% 100%);
        }
        .img-2 {
            width: 400px; height: 300px; right: 10%; top: 30%; transform: rotate(10deg); z-index: 3;
            clip-path: polygon(5% 0%, 100% 5%, 95% 100%, 0% 95%);
        }
        .img-3 {
            width: 350px; height: 350px; left: 40%; top: 40%; transform: rotate(-5deg); z-index: 4;
            clip-path: polygon(2% 2%, 98% 3%, 95% 97%, 3% 96%); border: 10px solid #000; padding:0; background: #000;
        }

        /* 
          =============================================
          DUCT TAPE ACCENTS
          =============================================
        */
        .tape { position: absolute; width: 150px; height: 40px; background: rgba(200,200,200,0.7); backdrop-filter: blur(2px); z-index: 10; }
        .tape-1 { top: -10px; left: 10px; transform: rotate(-30deg); }
        .tape-2 { bottom: -10px; right: -20px; transform: rotate(45deg); width: 100px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}

    </style>
</head>
<body>

    <div class="ransom-title">
        <div class="char-box c1">P</div>
        <div class="char-box c2">U</div>
        <div class="char-box c3">N</div>
        <div class="char-box c4">K</div>
        <div style="width: 20px;"></div> <!-- space -->
        <div class="char-box c5">W</div>
        <div class="char-box c6">E</div>
        <div class="char-box c1" style="background:#fff; color:#000;">B</div>
    </div>

    <div class="collage">
        
        <div class="cutout img-1">
            <div class="tape tape-1"></div>
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80" alt="Model 1">
        </div>

        <div class="cutout img-2">
            <div class="tape tape-2"></div>
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80" alt="Model 2">
        </div>

        <div class="cutout img-3">
            <div class="tape tape-1" style="top: -20px; right: 20px; left: auto; transform: rotate(15deg);"></div>
            <img src="https://images.unsplash.com/photo-1524504280156-9a4fbea4ca32?auto=format&fit=crop&w=800&q=80" alt="Model 3" style="filter: sepia(1) contrast(200%);">
        </div>

    </div>

    <p style="font-family: 'Courier Prime'; background: #000; color: #fff; padding: 10px; font-weight: bold; transform: rotate(2deg); margin-top: 5rem; z-index: 10;">
        /// DESTROY AND REBUILD /// GRAB THE SCISSORS /// CUT THE DOM
    </p>

</body>
</html>
